    <title>Contact | KW CONTROLS</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav>
      <div class="logo">KW CONTROLS</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>

    <section>
      <h1>Contact</h1>

      <p>
        Looking for PLC programming, troubleshooting, or commissioning support?
      </p>

      <p>Send a message and we'll get back to you as soon as possible.</p>

      <form
        class="contact-form"
        action="https://formsubmit.co/teck3618@gmail.com"
        method="POST"
      >
        <div class="form-row">
          <input type="text" name="name" placeholder="Name" required />
          <input type="email" name="email" placeholder="Email" required />
        </div>

        <input
          class="subject"
          type="text"
          name="subject"
          placeholder="Subject"
          required
        />

        <textarea
          class="message"
          name="message"
          placeholder="Tell us about your project..."
          required
        ></textarea>

        <button type="submit">Send Message</button>
      </form>
    </section>
  </body>
</html>
